name: Neurotech Newsletter

on:
  # Run daily at 6:00 AM ET (10:00 UTC during EDT, 11:00 UTC during EST)
  # Using 10:00 UTC for EDT (March-November)
  schedule:
    - cron: '0 10 * * *'  # 6:00 AM EDT / 10:00 UTC

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no Slack delivery)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      hours:
        description: 'Hours of news to fetch (default 72 for 3-day lookback)'
        required: false
        default: '72'

jobs:
  send-newsletter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Show current commit
        run: |
          echo "Current commit: $(git rev-parse HEAD)"
          echo "Latest commit should be: 707ad68 or newer"
          git log --oneline -3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytz

      - name: Download sent articles cache
        uses: actions/cache@v4
        with:
          path: data/sent_articles.json
          key: sent-articles-${{ github.run_id }}
          restore-keys: |
            sent-articles-

      - name: Run newsletter bot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GOOGLE_CSE_API_KEY: ${{ secrets.GOOGLE_CSE_API_KEY }}
          GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
        run: |
          cd ${{ github.workspace }}
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python src/main.py --dry-run --hours ${{ github.event.inputs.hours || '72' }}
          else
            python src/main.py --hours ${{ github.event.inputs.hours || '72' }}
          fi

      - name: Upload sent articles cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/sent_articles.json
          key: sent-articles-${{ github.run_id }}
